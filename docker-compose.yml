version: '3.8'

services:
  rag-postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fund_manager
      POSTGRES_PASSWORD: CHANGE_ME_LOCAL_DEV
      POSTGRES_DB: rag_lab
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fund_manager -d rag_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
